apiVersion: apps/v1
kind: Deployment

metadata:
    name: postgres
    namespace: trading-app

spec:
    replicas: 1

    selector:
        matchLabels:
            app: postgres

    template:
        metadata:
            labels:
                app: postgres
        spec:
            containers:
                - name: postgres
                  image: postgres:15.3

                  env:
                    - name: POSTGRES_DB
                      value: trading_db

                    - name: POSTGRES_USER
                      value: postgres

                    - name: POSTGRES_PASSWORD
                      value: user123

                  volumeMounts:
                    - name: postgres-storage
                      mountPath: /var/lib/postgresql/data


                  ports:
                    - containerPort: 5432
            volumes:
                - name: postgres-storage
                  persistentVolumeClaim:
                    claimName: postgres-pvc

